<!DOCTYPE html>
<html lang="ja">
<link rel="stylesheet" href="toDo.css">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toDO</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; padding: 20px; }
        .container { max-width: 640px; margin: 0 auto; }
        label { display:block; margin-top:12px; font-weight:600; }
        input[type="text"], input[type="date"], textarea {
            width:100%; padding:8px; box-sizing:border-box; margin-top:6px; border:1px solid #ccc; border-radius:4px;
        }
        textarea { min-height:100px; resize:vertical; }
        .actions { margin-top:12px; }
        button { padding:8px 14px; border:none; background:#0069d9; color:#fff; border-radius:4px; cursor:pointer; }
        button:disabled { opacity:0.6; cursor:not-allowed }
        .msg { margin-top:12px; color:green }
    </style>
</head>

<body>
    <div class="container">
        <h1>ToDo 作成</h1>

        <form id="todoForm">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="タイトルを入力してください" required>

            <label for="details">Details</label>
            <textarea id="details" name="details" placeholder="詳細を入力してください"></textarea>

            <label for="deadline">Deadline</label>
            <input type="date" id="deadline" name="deadline">

            <div class="actions">
                <button type="submit">追加</button>
            </div>
        </form>

        <div id="getItem"></div>


        <div id="result" class="msg" aria-live="polite"></div>
    </div>

    <script src="main.js"></script>
</body>

</html>
